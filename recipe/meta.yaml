{% set version = "2.0.0" %}

package:
  name: imagesize
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/i/imagesize/imagesize-{{ version }}.tar.gz
  sha256: 8e8358c4a05c304f1fccf7ff96f036e7243a189e9e42e90851993c558cfe9ee3

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python >=3.4
    - pip
  run:
    - python >=3.4

test:
  imports:
    - imagesize

about:
  home: https://github.com/shibukawa/imagesize_py
  license: MIT
  license_file: LICENSE.rst
  summary: Getting image size from png/jpeg/jpeg2000/gif file
  description: |
    This module analyzes jpeg/jpeg2000/png/gif image header and
    return image size.
  dev_url: https://github.com/shibukawa/imagesize_py

extra:
  recipe-maintainers:
    - chohner
